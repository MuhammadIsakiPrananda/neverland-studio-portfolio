server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html index.htm;

    # --- OPTIMASI: AKTIFKAN KOMPRESI GZIP ---
    # Mengurangi ukuran file teks (HTML, CSS, JS) yang dikirim ke browser.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6; # Level kompresi (1-9), 6 adalah kompromi yang baik.
    gzip_min_length 1000; # Jangan kompres file yang sangat kecil.
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- OPTIMASI: BROWSER CACHING UNTUK ASET STATIS ---
    # Memberitahu browser untuk menyimpan file-file ini selama 1 tahun.
    location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}