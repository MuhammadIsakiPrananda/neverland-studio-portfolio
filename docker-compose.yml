version: '3.8'

services:
  backend:
    build:
      context: ./neverland-backend
      dockerfile: Dockerfile
    container_name: neverland_backend
    ports:
      - "5000:5000"
    environment:
      # Tambahkan variabel lingkungan yang dibutuhkan backend di sini
      # Contoh:
      # DB_HOST: db
      # DB_USER: user
      # DB_PASSWORD: password
      # DB_NAME: neverland_db
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neverland_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge