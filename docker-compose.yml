version: '3.8'

services:
  # Layanan Web Aplikasi React + Nginx
  web:
    build:
      context: .
      dockerfile: dockerfile
    container_name: neverlandstudio
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - app-network

  # Layanan Database MariaDB
  db:
    image: mariadb:10.6
    container_name: mariadb_neverland
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - app-network

  # Layanan phpMyAdmin
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_neverland
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
    driver: local