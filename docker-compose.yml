version: '3.8'

services:
  backend:
    build:
      context: ./neverland-backend
      dockerfile: Dockerfile
    container_name: neverland_backend
    ports:
      # Hanya ekspos port ke localhost server untuk keamanan
      - "127.0.0.1:5000:5000"
    env_file:
      - ./neverland-backend/.env # Memuat variabel dari file .env
    depends_on:
      mariadb_neverland:
        condition: service_healthy # Menunggu sampai database benar-benar siap
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: neverland_frontend
    ports:
      # Hanya ekspos port ke localhost server, Argo Tunnel akan mengakses ini
      - "127.0.0.1:80:80"
    depends_on:
      - backend
    networks:
      - app-network

  mariadb_neverland:
    image: mariadb:10.6 # Menggunakan image MariaDB
    container_name: mariadb_neverland
    restart: always
    env_file:
      - ./neverland-backend/.env
    volumes:
      - mariadb-data:/var/lib/mysql
    # Healthcheck memastikan layanan lain hanya akan start jika database benar-benar siap
    healthcheck:
      # Gunakan variabel dari .env untuk memeriksa status
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USER}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: neverland_phpmyadmin
    restart: always
    ports:
      # Ganti port agar tidak konflik dan hanya ekspos ke localhost
      - "127.0.0.1:8081:80"
    environment:
      PMA_HOST: mariadb_neverland # Menunjuk ke service database
      PMA_PORT: 3306
    depends_on:
      mariadb_neverland:
        condition: service_healthy # Menunggu sampai phpmyadmin juga siap
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
volumes:
  mariadb-data: {} # Definisi volume eksplisit